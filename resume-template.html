
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Layout Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #667eea; --secondary: #764ba2; }
        body {
            font-family: 'Inter', sans-serif; min-height: 100vh;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center; padding: 20px; color: white;
        }
        .container { max-width: 1100px; width: 100%; text-align: center; }
        h1 { font-size: 2.2rem; margin-bottom: 8px; font-weight: 700; }
        .toggle-container {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            display: inline-flex; align-items: center; gap: 15px;
            padding: 14px 24px; border-radius: 50px; margin: 20px 0 35px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.3); transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background: #2ecc71; }
        input:checked + .slider:before { transform: translateX(24px); }
        .templates { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 35px; }
        .card {
            background: white; border-radius: 15px; height: 280px; padding: 20px;
            cursor: pointer; transition: 0.4s; border: 4px solid transparent; color: #333;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-5px); }
        .card.selected { border-color: #2ecc71; transform: scale(1.04); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .line { height: 6px; background: #eee; margin: 8px 0; border-radius: 4px; }
        .photo-preview {
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--primary); margin: 10px auto;
            display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s;
        }
        .hide-photo { opacity: 0; transform: scale(0); height: 0; margin: 0; }
        .card-label { position: absolute; bottom: 14px; right: 14px; font-size: 11px; font-weight: 700; color: #999; }
        .main-btn {
            padding: 16px 55px; border: none; border-radius: 14px; font-weight: 700;
            cursor: pointer; background: white; color: #333; transition: 0.3s;
            text-transform: uppercase; font-size: 15px;
        }
        .main-btn:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="container">
    <h1>Finalize Your Layout</h1>
    <p style="opacity:0.8; margin-bottom:5px;">Choose a style that matches your career goals</p>
    <div class="toggle-container">
        <span>Include Profile Photo?</span>
        <label class="switch">
            <input type="checkbox" id="photoToggle" checked onchange="togglePhoto()">
            <span class="slider"></span>
        </label>
    </div>
    <div class="templates">
        <div class="card" onclick="selectCard(this,'ats')">
            <div style="height:35px; background:#eee; margin-bottom:12px; border-radius:4px;"></div>
            <div class="line" style="width:90%"></div>
            <div class="line" style="width:80%"></div>
            <div class="line" style="width:85%"></div>
            <div class="line" style="width:70%"></div>
            <span class="card-label">ATS FRIENDLY</span>
        </div>
        <div class="card" onclick="selectCard(this,'professional')">
            <div class="photo-preview" id="p1"><i class="fas fa-user"></i></div>
            <div class="line" style="width:50%; margin:10px auto;"></div>
            <div class="line"></div>
            <div class="line" style="width:90%"></div>
            <span class="card-label">PROFESSIONAL</span>
        </div>
        <div class="card" onclick="selectCard(this,'modern')">
            <div style="display:flex; gap:8px; height:100%;">
                <div style="width:35%; border-right:1px solid #eee; padding-right:5px;">
                    <div class="photo-preview" id="p2" style="width:40px;height:40px;font-size:0.8rem;"><i class="fas fa-user"></i></div>
                    <div class="line" style="width:80%"></div>
                    <div class="line" style="width:60%"></div>
                </div>
                <div style="flex:1;">
                    <div class="line" style="height:12px;background:#ddd;"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>
            <span class="card-label">MODERN</span>
        </div>
    </div>
    <button class="main-btn" onclick="next()">Continue <i class="fas fa-chevron-right" style="margin-left:8px;"></i></button>
</div>

<script>
const userEmail = localStorage.getItem('email');
if (!userEmail) window.location.href = 'page1.html';

let selected = '';

function selectCard(el, type) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selected = type;
    if (type === 'ats') {
        document.getElementById('photoToggle').checked = false;
        togglePhoto();
    }
}

function togglePhoto() {
    const show = document.getElementById('photoToggle').checked;
    document.querySelectorAll('.photo-preview').forEach(p => {
        show ? p.classList.remove('hide-photo') : p.classList.add('hide-photo');
    });
}

async function next() {
    if (!selected) { alert('Please select a layout!'); return; }
    localStorage.setItem('finalTemplate', selected);
    localStorage.setItem('usePhoto', document.getElementById('photoToggle').checked);
    await fetch('http://localhost:5000/api/save-all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, layout: selected })
    });
    window.location.href = 'page7.html';
}
</script>
</body>
</html>
